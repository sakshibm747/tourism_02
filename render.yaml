services:
  - type: web
    name: tourism-02
    env: python
    rootDir: tourism_02
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: UPLOAD_PERSISTENT_DIR
        value: /var/data/uploads
    disks:
      - name: uploads-data
        mountPath: /var/data
        sizeGB: 1